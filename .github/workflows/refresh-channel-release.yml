name: Refresh Channel Release

on:
  repository_dispatch:
    types: [refresh-channel-release]
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Versioned release tag (e.g. v1.2.0-beta.3)'
        required: true
      channel:
        description: 'Release channel (alpha, beta, stable)'
        required: true
        default: 'beta'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve inputs
        id: inputs
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.source_tag }}
          DISPATCH_CHANNEL: ${{ github.event.client_payload.channel }}
          MANUAL_TAG: ${{ github.event.inputs.source_tag }}
          MANUAL_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          SOURCE_TAG="${DISPATCH_TAG:-$MANUAL_TAG}"
          CHANNEL="${DISPATCH_CHANNEL:-$MANUAL_CHANNEL}"
          echo "source_tag=${SOURCE_TAG}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"

      - name: Refresh rolling channel release
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_TAG: ${{ steps.inputs.outputs.source_tag }}
          CHANNEL: ${{ steps.inputs.outputs.channel }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          ROLLING_TAG="channel-${CHANNEL}"
          VERSION="${SOURCE_TAG#v}"

          echo "Refreshing ${ROLLING_TAG} → ${SOURCE_TAG}"

          # Download all assets from the versioned release
          mkdir -p /tmp/release-assets
          cd /tmp/release-assets
          if ! gh release download "${SOURCE_TAG}" --repo "${REPO}" 2>/dev/null; then
            echo "No downloadable assets for ${SOURCE_TAG} — nothing to mirror"
            exit 0
          fi

          FILE_COUNT=$(ls -1 | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "No assets downloaded — skipping rolling release update"
            exit 0
          fi
          echo "Downloaded ${FILE_COUNT} asset(s): $(ls -1 | tr '\n' ' ')"

          # alpha stays prerelease; beta and stable get Latest designation
          PRERELEASE_FLAG=""
          if [[ "$CHANNEL" == "alpha" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          NOTES="Rolling **${CHANNEL}** channel release — always the latest ${CHANNEL} build.

Current version: \`${VERSION}\`

For the full release history, see all [releases](https://github.com/${REPO}/releases)."

          # Remove any previous rolling release and its tag
          gh release delete "${ROLLING_TAG}" --repo "${REPO}" --yes 2>/dev/null || true
          gh api "repos/${REPO}/git/refs/tags/${ROLLING_TAG}" -X DELETE 2>/dev/null || true

          # Create rolling release
          gh release create "${ROLLING_TAG}" \
            --repo "${REPO}" \
            --title "Karaoke Video Creator — ${CHANNEL} channel" \
            --notes "${NOTES}" \
            ${PRERELEASE_FLAG}

          # Upload each asset
          for f in *; do
            [ -f "$f" ] || continue
            echo "Uploading $f..."
            gh release upload "${ROLLING_TAG}" --repo "${REPO}" "$f" --clobber
          done

          echo "✓ Rolling release ${ROLLING_TAG} updated to ${VERSION}"
